name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: TrpgVoiceDigest-linux-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            artifact: TrpgVoiceDigest-win-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/TrpgVoiceDigest.Gui/TrpgVoiceDigest.Gui.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            -p:DebugType=none \
            -o publish

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd publish
          chmod +x TrpgVoiceDigest.Gui
          tar -czf "../${{ matrix.artifact }}" *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd publish
          7z a "../${{ matrix.artifact }}" *

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
