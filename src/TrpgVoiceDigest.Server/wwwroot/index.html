<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TRPG 跑团看板</title>
    <link href="/css/style.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="container">
    <!-- Left Panel: Dialogue Chat -->
    <aside class="panel panel-left" id="panel-left">
        <header class="panel-header">剧本精炼</header>
        <div class="chat-area" id="chat-area">
            <div class="placeholder">等待数据同步…</div>
        </div>
    </aside>

    <!-- Divider handle -->
    <div class="divider" id="divider"></div>

    <!-- Right Panel: Tabs -->
    <main class="panel panel-right" id="panel-right">
        <nav class="tab-bar">
            <button class="tab active" data-tab="story">故事进展</button>
            <button class="tab" data-tab="tasks">任务</button>
        </nav>
        <div class="tab-content" id="tab-content">
            <div class="tab-pane active" id="pane-story">
                <div class="placeholder">等待数据同步…</div>
            </div>
            <div class="tab-pane" id="pane-tasks">
                <div class="placeholder">等待数据同步…</div>
            </div>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
