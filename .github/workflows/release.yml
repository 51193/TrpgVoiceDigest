name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
          - os: windows-latest
            rid: win-x64
            ext: '.exe'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish src/TrpgVoiceDigest.Gui/TrpgVoiceDigest.Gui.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd publish/${{ matrix.rid }}
          chmod +x TrpgVoiceDigest.Gui
          tar -czf ../../TrpgVoiceDigest-linux-x64.tar.gz *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd publish/${{ matrix.rid }}
          7z a ../../TrpgVoiceDigest-win-x64.zip *

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TrpgVoiceDigest-linux-x64.tar.gz
            TrpgVoiceDigest-win-x64.zip
