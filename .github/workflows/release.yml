name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: TrpgVoiceDigest-linux-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            artifact: TrpgVoiceDigest-win-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/TrpgVoiceDigest.Gui/TrpgVoiceDigest.Gui.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            -p:DebugType=none \
            -o publish

      - name: Download ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p publish/tools/ffmpeg
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" -o /tmp/ffmpeg.tar.xz
          FFMPEG_DIR=$(tar -tf /tmp/ffmpeg.tar.xz 2>/dev/null | sed -n '1s|/.*||p')
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          cp "/tmp/${FFMPEG_DIR}/bin/ffmpeg" publish/tools/ffmpeg/ffmpeg
          cp "/tmp/${FFMPEG_DIR}/bin/ffprobe" publish/tools/ffmpeg/ffprobe
          chmod +x publish/tools/ffmpeg/ffmpeg publish/tools/ffmpeg/ffprobe
          echo "Bundled ffmpeg version:"
          publish/tools/ffmpeg/ffmpeg -version 2>&1 | head -1 || true

      - name: Download ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p publish/tools/ffmpeg
          curl -fsSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o /tmp/ffmpeg.zip
          FFMPEG_DIR=$(unzip -Z1 /tmp/ffmpeg.zip 2>/dev/null | sed -n '1s|[/\\].*||p')
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg_extract
          cp "/tmp/ffmpeg_extract/${FFMPEG_DIR}/bin/ffmpeg.exe" publish/tools/ffmpeg/ffmpeg.exe
          cp "/tmp/ffmpeg_extract/${FFMPEG_DIR}/bin/ffprobe.exe" publish/tools/ffmpeg/ffprobe.exe

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd publish
          chmod +x TrpgVoiceDigest.Gui
          # Copy SETUP.md into the package for user reference
          cp ../SETUP.md ./SETUP.md
          tar -czf "../${{ matrix.artifact }}" *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd publish
          cp ../SETUP.md ./SETUP.md
          7z a "../${{ matrix.artifact }}" *

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
