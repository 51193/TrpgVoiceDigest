name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: TrpgVoiceDigest-linux-x64.tar.gz
            server_artifact: TrpgVoiceDigest-Server-linux-x64.tar.gz
            upload_artifact: TrpgVoiceDigest-Upload-linux-x64.tar.gz
          - os: windows-latest
            rid: win-x64
            artifact: TrpgVoiceDigest-win-x64.zip
            server_artifact: TrpgVoiceDigest-Server-win-x64.zip
            upload_artifact: TrpgVoiceDigest-Upload-win-x64.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore --verbosity normal

      - name: Publish, Bundle ffmpeg & Package
        shell: bash
        run: |
          chmod +x scripts/ci_publish_package.sh
          RUNTIME_ID="${{ matrix.rid }}" ./scripts/ci_publish_package.sh --skip-test

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.server_artifact }}
            ${{ matrix.upload_artifact }}
